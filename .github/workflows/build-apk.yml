name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ZIP dosyasini ac
        run: unzip -q ZombieRush3D_v2*.zip
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      - name: APK Build
        run: cd ZombieRush3D_v2 && gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: ZombieRush3D-APK
          path: ZombieRush3D_v2/app/build/outputs/apk/debug/app-debug.apk
