name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: APK Build
        run: |
          echo "Repodaki dosyalar:" && ls -la
          unzip -o -q ZombieRush3D*.zip
          echo "Acilan icerik:" && ls -la
          SG=$(find . -maxdepth 2 -name "settings.gradle" | head -1)
          if [ -z "$SG" ]; then echo "HATA: Proje bulunamadi! Yanlis ZIP yuklenmis olabilir."; exit 1; fi
          PROJE=$(dirname "$SG")
          echo "Bulunan proje: $PROJE"
          sed -i '/appcompat/d' "$PROJE/app/build.gradle"
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          GRADLE=$(pwd)/gradle-8.5/bin/gradle
          cd "$PROJE"
          "$GRADLE" assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: ZombieRush3D-APK
          path: '**/app/build/outputs/apk/debug/app-debug.apk'
